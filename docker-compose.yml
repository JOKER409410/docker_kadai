name: saishu-kadai

services:
  web:
    build: .
    container_name: seat-app-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - sqlite_data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
    tty: true
    stdin_open: true

volumes:
  sqlite_data: